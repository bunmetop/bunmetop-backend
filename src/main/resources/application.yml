spring:
  application:
    name: bunmetop-backend
  
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/bunmetop}
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

  security:
    jwt:
      secret: "c2VjcmV0LWtleS1mb3ItYnVubWV0b3AtZWNvbW1lcmNlLXBsYXRmb3Jt" # Base64 encoded secret for JWT
      expiration: 86400000

server:
  port: 8080

logging:
  level:
    org.springframework.data.mongodb: DEBUG
    org.springframework.web.reactive: INFO
